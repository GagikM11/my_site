<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GagaChat — Демо</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0e1621; color: white; height: 100vh; display: flex; flex-direction: column; }
        header { background: #17212b; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: #2b5278; padding: 8px 12px; border-radius: 14px; max-width: 80%; word-wrap: break-word; }
        .my { align-self: flex-end; background: #2b5278; }
        .other { align-self: flex-start; background: #182533; }
        .nick { font-weight: bold; font-size: 12px; color: #64b5f6; }
        .time { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; text-align: right; }
        .footer { background: #17212b; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; background: #242f3d; border: none; padding: 12px; border-radius: 22px; color: white; outline: none; }
        button { background: #5085b1; border: none; padding: 10px 20px; border-radius: 22px; color: white; cursor: pointer; }
        .login-box { background: #17212b; padding: 30px; border-radius: 10px; width: 300px; margin: auto; text-align: center; }
        .login-box input { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        .login-box button { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    let currentUser = localStorage.getItem('gagachat_user');
    let messages = JSON.parse(localStorage.getItem('gagachat_messages') || '[]');

    function saveMessages() {
        localStorage.setItem('gagachat_messages', JSON.stringify(messages));
    }

    function renderChat() {
        document.getElementById('app').innerHTML = `
            <header>GagaChat (локальная версия)</header>
            <div id="chat"></div>
            <div class="footer">
                <input type="text" id="message-input" placeholder="Сообщение">
                <button onclick="sendMessage()">➤</button>
            </div>
        `;
        loadMessages();
        document.getElementById('message-input')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    }

    function loadMessages() {
        const chatDiv = document.getElementById('chat');
        if (!chatDiv) return;
        chatDiv.innerHTML = '';
        messages.forEach(m => {
            const div = document.createElement('div');
            div.className = `message ${m.nickname === currentUser ? 'my' : 'other'}`;
            div.innerHTML = `<div class="nick">${escapeHtml(m.nickname)}</div>${escapeHtml(m.message)}<div class="time">${m.time}</div>`;
            chatDiv.appendChild(div);
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;
        messages.push({
            nickname: currentUser,
            message: text,
            time: new Date().toLocaleTimeString()
        });
        saveMessages();
        input.value = '';
        loadMessages();
    }

    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0e1621;">
                <div class="login-box">
                    <h2>GagaChat</h2>
                    <input type="text" id="nick" placeholder="Твой ник">
                    <button onclick="login()">Войти в чат</button>
                </div>
            </div>
        `;
    }

    function login() {
        const nick = document.getElementById('nick').value.trim();
        if (nick) {
            localStorage.setItem('gagachat_user', nick);
            currentUser = nick;
            renderChat();
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    if (currentUser) renderChat();
    else renderLogin();
</script>
</body>
</html>
