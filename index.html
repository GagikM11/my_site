<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Gaga_Chat | Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0a0a0f;
            position: relative;
        }

        .tg-header {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .back-btn, .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .back-btn:active, .menu-btn:active {
            background: rgba(255,255,255,0.1);
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #646cff, #ff5078);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-size: 17px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-status {
            font-size: 13px;
            color: #44ff44;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
        }

        .chat-item:active {
            background: rgba(255,255,255,0.05);
        }

        .chat-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, #646cff, #ff5078);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .chat-preview {
            flex: 1;
            min-width: 0;
        }

        .chat-preview h4 {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-preview p {
            font-size: 14px;
            color: #8e8e93;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .star-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .star-btn:active {
            transform: scale(1.1);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0a0a0f;
            -webkit-overflow-scrolling: touch;
        }

        .message-row {
            display: flex;
            width: 100%;
            position: relative;
        }

        .message-row.outgoing {
            justify-content: flex-end;
        }

        .message-row.incoming {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            cursor: pointer;
            transition: 0.1s;
        }

        .bubble:active {
            opacity: 0.7;
        }

        .outgoing .bubble {
            background: #2b6fde;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .incoming .bubble {
            background: #1c1c1e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .reply-preview {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-left: 2px solid;
            padding-left: 8px;
        }

        .bubble-text {
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        .edited-badge {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 4px;
        }

        .bubble-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .message-menu {
            position: fixed;
            background: #1c1c1e;
            border-radius: 14px;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 200;
            display: none;
            backdrop-filter: blur(20px);
        }

        .message-menu button {
            background: none;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 10px;
        }

        .message-menu button:active {
            background: rgba(255,255,255,0.1);
        }

        .reply-bar {
            background: #1c1c1e;
            padding: 8px 12px;
            display: none;
            align-items: center;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .reply-bar span {
            flex: 1;
            font-size: 13px;
            color: #8e8e93;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .reply-bar button {
            background: none;
            border: none;
            color: #2b6fde;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .input-container {
            flex-shrink: 0;
            background: #1c1c1e;
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        .input-bar {
            padding: 8px 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-bar input {
            flex: 1;
            background: #2c2c2e;
            border: none;
            padding: 12px 16px;
            border-radius: 24px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .input-bar input::placeholder {
            color: #8e8e93;
        }

        .send-btn {
            background: #2b6fde;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .auth-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .auth-card {
            background: #1c1c1e;
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 340px;
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #646cff, #ff5078);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-card input {
            width: 100%;
            padding: 14px;
            background: #2c2c2e;
            border: none;
            border-radius: 14px;
            color: white;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .auth-card button {
            width: 100%;
            padding: 14px;
            background: #2b6fde;
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .switch-link {
            text-align: center;
            margin-top: 16px;
            color: #2b6fde;
            cursor: pointer;
        }

        .hide {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3c;
            border-radius: 4px;
        }

        .private-bubble {
            background: rgba(255,193,7,0.12);
            border: 0.5px solid rgba(255,193,7,0.3);
            border-radius: 20px;
            padding: 8px 16px;
            display: inline-block;
            color: #ffc107;
            font-size: 13px;
        }

        .private-message {
            text-align: center;
            margin: 20px 0;
        }

        /* Desktop styles */
        @media (min-width: 768px) {
            .app-container {
                max-width: 500px;
                margin: 0 auto;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
            }
            
            body {
                background: #000;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .bubble {
                max-width: 70%;
            }
        }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h2>🔐 Gaga_Chat</h2>
        <input type="text" id="loginUsername" placeholder="Имя пользователя">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="doLogin">Войти</button>
        <div class="switch-link" id="toRegister">Нет аккаунта? Создать</div>
    </div>
    <div class="auth-card hide" id="registerCard">
        <h2>📝 Регистрация</h2>
        <input type="text" id="regUsername" placeholder="Имя пользователя">
        <input type="password" id="regPassword" placeholder="Пароль">
        <button id="doRegister">Зарегистрироваться</button>
        <div class="switch-link" id="toLogin">Уже есть аккаунт? Войти</div>
    </div>
</div>

<div id="chatsScreen" class="hide app-container">
    <div class="tg-header">
        <div class="avatar">👤</div>
        <div class="chat-info">
            <div class="chat-name" id="currentUserName">Gaga_Chat</div>
            <div class="chat-status">⭐ Избранное и чаты</div>
        </div>
        <button id="logoutBtn" class="menu-btn" style="color:#ff5078;">🚪</button>
    </div>
    <div class="chats-list" id="chatsList"></div>
    <div class="input-container">
        <div class="input-bar">
            <input type="text" id="newChatUser" placeholder="👤 Имя для нового чата">
            <button id="createChatBtn" class="send-btn" style="background:#2b6fde;">+</button>
        </div>
    </div>
</div>

<div id="chatScreen" class="hide app-container">
    <div class="tg-header">
        <button class="back-btn" id="backToChats">←</button>
        <div class="avatar" id="chatAvatar">👤</div>
        <div class="chat-info">
            <div class="chat-name" id="chatWithName"></div>
            <div class="chat-status" id="chatStatus">онлайн</div>
        </div>
        <button id="starInChat" class="menu-btn" style="color:#ffc107;">☆</button>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="reply-bar" id="replyBar">
        <span id="replyText">✏️ Ответ...</span>
        <button id="cancelReplyBtn">✖</button>
    </div>
    <div class="input-container">
        <div class="input-bar">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="sendBtn" class="send-btn">📤</button>
        </div>
    </div>
</div>

<div id="messageMenu" class="message-menu">
    <button id="replyMenuItem">↩️ Ответить</button>
    <button id="editMenuItem">✏️ Редактировать</button>
    <button id="deleteMenuItem">🗑️ Удалить</button>
</div>

<script>
    let currentUser = null;
    let currentChatWith = null;
    let selectedMessage = null;
    let replyToMessage = null;
    let editingMessage = null;
    let originalScrollHeight = 0;

    function getUsers() {
        let users = localStorage.getItem('gaga_users');
        return users ? JSON.parse(users) : {};
    }
    
    function saveUsers(users) {
        localStorage.setItem('gaga_users', JSON.stringify(users));
    }
    
    function getMessages(user1, user2) {
        let key = 'chat_' + [user1, user2].sort().join('_');
        let msgs = localStorage.getItem(key);
        return msgs ? JSON.parse(msgs) : [];
    }
    
    function saveMessages(user1, user2, messages) {
        let key = 'chat_' + [user1, user2].sort().join('_');
        localStorage.setItem(key, JSON.stringify(messages));
    }
    
    function addMessage(from, to, text, replyTo = null) {
        let messages = getMessages(from, to);
        messages.push({
            id: Date.now() + Math.random(),
            from: from,
            text: text,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            edited: false,
            replyTo: replyTo
        });
        saveMessages(from, to, messages);
    }
    
    function deleteMessage(from, to, msgId) {
        let messages = getMessages(from, to);
        messages = messages.filter(m => m.id != msgId);
        saveMessages(from, to, messages);
    }
    
    function editMessage(from, to, msgId, newText) {
        let messages = getMessages(from, to);
        for (let i = 0; i < messages.length; i++) {
            if (messages[i].id == msgId && messages[i].from === from) {
                messages[i].text = newText;
                messages[i].edited = true;
                break;
            }
        }
        saveMessages(from, to, messages);
    }
    
    function register(username, password) {
        let users = getUsers();
        if (users[username]) return false;
        let privateChat = '📓 ' + username + ' (личное)';
        users[username] = {
            password: btoa(password),
            chats: [privateChat],
            favorites: [privateChat]
        };
        saveUsers(users);
        return true;
    }
    
    function login(username, password) {
        let users = getUsers();
        if (users[username] && atob(users[username].password) === password) {
            currentUser = username;
            let nameElem = document.getElementById('currentUserName');
            if (nameElem) nameElem.innerText = username;
            return true;
        }
        return false;
    }
    
    function isFavorite(chatName) {
        let users = getUsers();
        let favs = users[currentUser]?.favorites || [];
        return favs.includes(chatName);
    }
    
    function toggleFavorite(chatName) {
        let users = getUsers();
        let favs = users[currentUser].favorites || [];
        if (favs.includes(chatName)) {
            users[currentUser].favorites = favs.filter(f => f !== chatName);
        } else {
            users[currentUser].favorites.push(chatName);
        }
        saveUsers(users);
        renderChats();
        updateStarInChat();
    }
    
    function createChatWith(otherUser) {
        if (otherUser === currentUser) return true;
        let users = getUsers();
        if (!users[otherUser]) return false;
        let userData = users[currentUser];
        if (!userData.chats.includes(otherUser)) {
            userData.chats.push(otherUser);
            saveUsers(users);
        }
        return true;
    }
    
    function renderChats() {
        let users = getUsers();
        let allChats = users[currentUser]?.chats || [];
        let favorites = users[currentUser]?.favorites || [];
        let favoriteChats = [];
        let regularChats = [];
        for (let i = 0; i < allChats.length; i++) {
            let chat = allChats[i];
            if (favorites.includes(chat)) {
                favoriteChats.push(chat);
            } else {
                regularChats.push(chat);
            }
        }
        let container = document.getElementById('chatsList');
        if (!container) return;
        container.innerHTML = '';
        if (favoriteChats.length > 0) {
            let favTitle = document.createElement('div');
            favTitle.style.cssText = 'padding: 12px 16px 4px 16px; color:#8e8e93; font-size:13px;';
            favTitle.innerText = '⭐ ИЗБРАННОЕ';
            container.appendChild(favTitle);
            for (let i = 0; i < favoriteChats.length; i++) {
                container.appendChild(createChatItem(favoriteChats[i], true));
            }
        }
        if (regularChats.length > 0) {
            let regTitle = document.createElement('div');
            regTitle.style.cssText = 'padding: 12px 16px 4px 16px; color:#8e8e93; font-size:13px;';
            regTitle.innerText = '💬 ЧАТЫ';
            container.appendChild(regTitle);
            for (let i = 0; i < regularChats.length; i++) {
                container.appendChild(createChatItem(regularChats[i], false));
            }
        }
        if (allChats.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#8e8e93;padding:40px;">Нет чатов</div>';
        }
    }
    
    function createChatItem(chatName, isFav) {
        let div = document.createElement('div');
        div.className = 'chat-item';
        let isPrivate = chatName.includes('(личное)');
        let displayName = isPrivate ? currentUser + ' (заметки)' : chatName;
        let emoji = isPrivate ? '📓' : '👤';
        div.innerHTML = `
            <div class="chat-avatar">${emoji}</div>
            <div class="chat-preview">
                <h4>${escapeHtml(displayName)}</h4>
                <p>${isPrivate ? 'Личные заметки' : 'Нажмите для чата'}</p>
            </div>
            <button class="star-btn" style="color:${isFav ? '#ffc107' : '#555'};">${isFav ? '★' : '☆'}</button>
        `;
        let preview = div.querySelector('.chat-preview');
        if (preview) {
            preview.onclick = () => openChat(chatName);
        }
        let starBtn = div.querySelector('.star-btn');
        if (starBtn) {
            starBtn.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(chatName);
            };
        }
        return div;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        let div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function openChat(withUser) {
        currentChatWith = withUser;
        replyToMessage = null;
        editingMessage = null;
        let replyBar = document.getElementById('replyBar');
        if (replyBar) replyBar.style.display = 'none';
        let isPrivate = withUser.includes('(личное)');
        let displayName = isPrivate ? currentUser + ' (заметки)' : withUser;
        let nameElem = document.getElementById('chatWithName');
        if (nameElem) nameElem.innerText = displayName;
        let avatarElem = document.getElementById('chatAvatar');
        if (avatarElem) avatarElem.innerHTML = isPrivate ? '📓' : '👤';
        let statusElem = document.getElementById('chatStatus');
        if (statusElem) statusElem.innerText = isPrivate ? 'личные заметки' : 'онлайн';
        updateStarInChat();
        renderMessages();
        let chatsScreen = document.getElementById('chatsScreen');
        let chatScreen = document.getElementById('chatScreen');
        if (chatsScreen) chatsScreen.classList.add('hide');
        if (chatScreen) chatScreen.classList.remove('hide');
        
        // Focus on input after opening chat
        setTimeout(() => {
            let input = document.getElementById('messageInput');
            if (input) input.focus();
        }, 100);
    }
    
    function updateStarInChat() {
        let starBtn = document.getElementById('starInChat');
        if (!starBtn) return;
        if (currentChatWith && isFavorite(currentChatWith)) {
            starBtn.innerHTML = '★';
            starBtn.style.color = '#ffc107';
        } else {
            starBtn.innerHTML = '☆';
            starBtn.style.color = '#555';
        }
    }
    
    function showMessageMenu(event, msg) {
        event.stopPropagation();
        selectedMessage = msg;
        let menu = document.getElementById('messageMenu');
        if (!menu) return;
        menu.style.display = 'block';
        let x = event.pageX;
        let y = event.pageY;
        if (x + 150 > window.innerWidth) x = window.innerWidth - 160;
        if (y + 150 > window.innerHeight) y = window.innerHeight - 160;
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        let closeMenu = function(e) {
            if (menu && !menu.contains(e.target)) {
                menu.style.display = 'none';
                document.removeEventListener('click', closeMenu);
            }
        };
        setTimeout(() => {
            document.addEventListener('click', closeMenu);
        }, 10);
    }
    
    function renderMessages() {
        let messages = getMessages(currentUser, currentChatWith);
        let container = document.getElementById('messagesContainer');
        if (!container) return;
        
        // Save scroll position
        let wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
        
        container.innerHTML = '';
        let isPrivate = currentChatWith.includes('(личное)');
        for (let i = 0; i < messages.length; i++) {
            let msg = messages[i];
            let row = document.createElement('div');
            let isMe = msg.from === currentUser;
            row.className = `message-row ${isMe ? 'outgoing' : 'incoming'}`;
            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            let replyHtml = '';
            if (msg.replyTo) {
                let repliedMsg = null;
                for (let j = 0; j < messages.length; j++) {
                    if (messages[j].id == msg.replyTo) {
                        repliedMsg = messages[j];
                        break;
                    }
                }
                if (repliedMsg) {
                    replyHtml = `<div class="reply-preview">↩️ ${escapeHtml(repliedMsg.from)}: ${escapeHtml(repliedMsg.text.substring(0, 50))}</div>`;
                }
            }
            bubble.innerHTML = replyHtml + `<div class="bubble-text">${escapeHtml(msg.text)}${msg.edited ? '<span class="edited-badge"> (ред.)</span>' : ''}</div><div class="bubble-time">${msg.time}</div>`;
            bubble.onclick = (function(m) {
                return function(e) {
                    e.stopPropagation();
                    showMessageMenu(e, m);
                };
            })(msg);
            row.appendChild(bubble);
            container.appendChild(row);
        }
        if (isPrivate && messages.length === 0) {
            let note = document.createElement('div');
            note.className = 'private-message';
            note.innerHTML = '<div class="private-bubble">📝 Здесь будут ваши личные заметки</div>';
            container.appendChild(note);
        }
        
        // Restore scroll position
        if (wasAtBottom) {
            container.scrollTop = container.scrollHeight;
        }
    }
    
    function sendMessage() {
        let input = document.getElementById('messageInput');
        if (!input) return;
        let text = input.value.trim();
        if (!text) return;
        if (editingMessage) {
            editMessage(currentUser, currentChatWith, editingMessage.id, text);
            editingMessage = null;
            let replyBar = document.getElementById('replyBar');
            if (replyBar) replyBar.style.display = 'none';
        } else {
            addMessage(currentUser, currentChatWith, text, replyToMessage ? replyToMessage.id : null);
            replyToMessage = null;
            let replyBar = document.getElementById('replyBar');
            if (replyBar) replyBar.style.display = 'none';
        }
        renderMessages();
        input.value = '';
        input.focus();
        
        // Scroll to bottom
        let container = document.getElementById('messagesContainer');
        if (container) {
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 50);
        }
    }
    
    function showAuth() {
        let authScreen = document.getElementById('authScreen');
        let chatsScreen = document.getElementById('chatsScreen');
        let chatScreen = document.getElementById('chatScreen');
        if (authScreen) authScreen.classList.remove('hide');
        if (chatsScreen) chatsScreen.classList.add('hide');
        if (chatScreen) chatScreen.classList.add('hide');
    }
    
    function showChats() {
        renderChats();
        let authScreen = document.getElementById('authScreen');
        let chatsScreen = document.getElementById('chatsScreen');
        let chatScreen = document.getElementById('chatScreen');
        if (authScreen) authScreen.classList.add('hide');
        if (chatsScreen) chatsScreen.classList.remove('hide');
        if (chatScreen) chatScreen.classList.add('hide');
    }
    
    // Handle keyboard visibility
    function handleKeyboardShow() {
        let container = document.getElementById('messagesContainer');
        if (container) {
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }
    }
    
    // Focus and blur handlers
    let messageInput = document.getElementById('messageInput');
    if (messageInput) {
        messageInput.addEventListener('focus', handleKeyboardShow);
        messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    }
    
    // Elements initialization
    let loginBtn = document.getElementById('doLogin');
    if (loginBtn) {
        loginBtn.onclick = () => {
            let user = document.getElementById('loginUsername').value;
            let pass = document.getElementById('loginPassword').value;
            if (login(user, pass)) showChats();
            else alert('Неверно');
        };
    }
    
    let registerBtn = document.getElementById('doRegister');
    if (registerBtn) {
        registerBtn.onclick = () => {
            let user = document.getElementById('regUsername').value;
            let pass = document.getElementById('regPassword').value;
            if (register(user, pass)) {
                alert('Успех! Войдите');
                let toLogin = document.getElementById('toLogin');
                if (toLogin) toLogin.click();
            } else alert('Пользователь есть');
        };
    }
    
    let toRegisterBtn = document.getElementById('toRegister');
    if (toRegisterBtn) {
        toRegisterBtn.onclick = () => {
            let registerCard = document.getElementById('registerCard');
            let authCard = document.querySelector('.auth-card');
            if (registerCard) registerCard.classList.remove('hide');
            if (authCard) authCard.classList.add('hide');
        };
    }
    
    let toLoginBtn = document.getElementById('toLogin');
    if (toLoginBtn) {
        toLoginBtn.onclick = () => {
            let registerCard = document.getElementById('registerCard');
            let authCard = document.querySelector('.auth-card');
            if (registerCard) registerCard.classList.add('hide');
            if (authCard) authCard.classList.remove('hide');
        };
    }
    
    let logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.onclick = () => { currentUser = null; showAuth(); };
    }
    
    let backBtn = document.getElementById('backToChats');
    if (backBtn) {
        backBtn.onclick = () => showChats();
    }
    
    let starChatBtn = document.getElementById('starInChat');
    if (starChatBtn) {
        starChatBtn.onclick = () => { if (currentChatWith) toggleFavorite(currentChatWith); };
    }
    
    let createChatBtn = document.getElementById('createChatBtn');
    if (createChatBtn) {
        createChatBtn.onclick = () => {
            let other = document.getElementById('newChatUser').value;
            if (createChatWith(other)) { 
                renderChats(); 
                let input = document.getElementById('newChatUser');
                if (input) input.value = '';
            } else if (other !== currentUser) {
                alert('Пользователь не найден');
            }
        };
    }
    
    let sendBtn = document.getElementById('sendBtn');
    if (sendBtn) {
        sendBtn.onclick = sendMessage;
    }
    
    let replyMenuItem = document.getElementById('replyMenuItem');
    if (replyMenuItem) {
        replyMenuItem.onclick = () => {
            if (selectedMessage) {
                replyToMessage = selectedMessage;
                let replyText = document.getElementById('replyText');
                if (replyText) {
                    replyText.innerHTML = `✏️ Ответ ${selectedMessage.from}: ${selectedMessage.text.substring(0, 40)}`;
                }
                let replyBar = document.getElementById('replyBar');
                if (replyBar) replyBar.style.display = 'flex';
                let menu = document.getElementById('messageMenu');
                if (menu) menu.style.display = 'none';
                let input = document.getElementById('messageInput');
                if (input) input.focus();
            }
        };
    }
    
    let editMenuItem = document.getElementById('editMenuItem');
    if (editMenuItem) {
        editMenuItem.onclick = () => {
            if (selectedMessage && selectedMessage.from === currentUser) {
                editingMessage = selectedMessage;
                let input = document.getElementById('messageInput');
                if (input) input.value = selectedMessage.text;
                let replyBar = document.getElementById('replyBar');
                if (replyBar) {
                    replyBar.style.display = 'flex';
                    let replyText = document.getElementById('replyText');
                    if (replyText) replyText.innerHTML = `✏️ Редактирование`;
                }
                let menu = document.getElementById('messageMenu');
                if (menu) menu.style.display = 'none';
                if (input) input.focus();
            } else {
                alert('Можно редактировать только свои сообщения');
            }
        };
    }
    
    let deleteMenuItem = document.getElementById('deleteMenuItem');
    if (deleteMenuItem) {
        deleteMenuItem.onclick = () => {
            if (selectedMessage && selectedMessage.from === currentUser) {
                deleteMessage(currentUser, currentChatWith, selectedMessage.id);
                renderMessages();
            } else {
                alert('Можно удалять только свои сообщения');
            }
            let menu = document.getElementById('messageMenu');
            if (menu) menu.style.display = 'none';
        };
    }
    
    let cancelReplyBtn = document.getElementById('cancelReplyBtn');
    if (cancelReplyBtn) {
        cancelReplyBtn.onclick = () => {
            replyToMessage = null;
            editingMessage = null;
            let replyBar = document.getElementById('replyBar');
            if (replyBar) replyBar.style.display = 'none';
            let input = document.getElementById('messageInput');
            if (input) input.value = '';
        };
    }
    
    // Initialize test users
    if (!localStorage.getItem('gaga_users')) {
        register('Alice', '123');
        register('Bob', '123');
        register('Charlie', '123');
    }
    showAuth();
</script>
</body>
</html>
