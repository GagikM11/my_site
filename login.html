<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GagaChat | Вход</title>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #17212b; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #242f3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #5085b1; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>GagaChat</h2>
        <input type="text" id="u" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="auth('login')">Войти</button>
        <button onclick="auth('register')" style="background:none; color:#64b5f6; margin-top:10px;">Регистрация</button>
    </div>
    <script>
        async function auth(type) {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const res = await fetch('/api/' + type, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if (res.ok) window.location.href = '/';
            else alert(data.message);
        }
    </script>
</body>
</html>
